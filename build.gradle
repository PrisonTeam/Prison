println """
==========================================================================
You are building the Prison plugin 
  Prison Version:  ${project.version} 
  Build time:	  ${getCurrentTimestamp()}
  Java version:	
  Test value:	  ${targetArchiveClassifier}

Output files are located in [subproject]/build/libs.
