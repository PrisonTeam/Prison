Example: The spigot build artifact is:
			 prison-spigot/build/libs/Prison-${project.version}.jar

NOTE: Prison is now producing a second runnable jar that supports 
      both the new blocks in Spigot 1.21.x and Spigot 26 and Paper 26.
      The spigot 26 build artifact is:
			 prison26-spigot/build/libs/Prison26-${project.version}.jar
      
==========================================================================
