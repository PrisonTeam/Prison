<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta charset="utf-8" />
    
    <title>Prison - Test Document Titles</title>

    <style type="text/css">
    
    	.prison-img-header {
    		width: 96%;
    	}
    
		.prison-banner {
			display: inline-block;
			width: 96%;
			max-width: 60em;
			
			border: 10px black solid;
			
			border-radius: 90px;
			
			font-family: sans-serif;
			font-weight: bold;
			font-size: 150px;
			
			
			background-color: #ffb000;
			
			text-align: center;
			
		}
		.prison-logo {
			display: block;
			height: auto;
			width: auto;
			
			position: relative;
			
			background-image: url(images/Prison_Logo_Small.png);

		}
		
		.prison-logo > img {
			
			position: absolute;
			top: 0;
			left: 0;

			max-width: 1.26em;
			
			margin: -10px;
		}
    </style>
</head>
<body>

	<div>
	
		<span class="prison-banner">
			<span class="prison-logo">
				<img src="images/Prison_Logo_Small.png" ></img>
			</span>
			
			<span class="title">PRISON</span>
		</span>
	
	
	</div>
	
	<div>
		<img class="prison-img-header" src="images/Sectional_Header_Prison.png" ></img>
	</div>
	<div>
		<img class="prison-img-header" src="images/Sectional_Header_Prison_Long.png" ></img>
	</div>
</body>
</html>
